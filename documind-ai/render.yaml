services:
  # FastAPI Backend
  - type: web
    name: documind-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # Streamlit Frontend
  - type: web
    name: documind-frontend
    runtime: python
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        fromService:
          name: documind-backend
          type: web
          property: host
      - key: PYTHON_VERSION
        value: 3.11.0
